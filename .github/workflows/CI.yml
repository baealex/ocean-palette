name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'biome.json'
      - 'lefthook.yml'
      - '.nvmrc'
      - '.github/workflows/CI.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'biome.json'
      - 'lefthook.yml'
      - '.nvmrc'
      - '.github/workflows/CI.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js from .nvmrc
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Enable pnpm
      run: corepack enable

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Audit Dependencies
      run: pnpm audit

    - name: Lint (Server)
      run: pnpm --filter @ocean-palette/server run lint

    - name: Test (Server)
      run: pnpm --filter @ocean-palette/server run test

    - name: Typecheck (Server)
      run: pnpm --filter @ocean-palette/server run type-check

    - name: Build (Server)
      run: pnpm --filter @ocean-palette/server run build

    - name: Lint (Client React)
      run: pnpm --filter @ocean-palette/client run lint

    - name: Typecheck (Client React)
      run: pnpm --filter @ocean-palette/client run type-check

    - name: React Compiler Healthcheck (Client React)
      run: pnpm --filter @ocean-palette/client run react-compiler:check

    - name: Test (Client React)
      run: pnpm --filter @ocean-palette/client run test

    - name: Build (Client React)
      run: pnpm --filter @ocean-palette/client run build
