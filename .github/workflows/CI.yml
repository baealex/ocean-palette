name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/CI.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/CI.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}

    - name: Enable pnpm
      run: corepack enable && corepack prepare pnpm@10.25.0 --activate

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Audit Dependencies
      run: pnpm audit
    
    - name: Lint (Server)
      run: pnpm --filter @ocean-palette/server run lint
    
    - name: Test (Server)
      run: pnpm --filter @ocean-palette/server run test
    
    - name: Build (Server)
      run: pnpm --filter @ocean-palette/server run build

    - name: Lint (Client React)
      run: pnpm --filter @ocean-palette/client run lint

    - name: Typecheck (Client React)
      run: pnpm --filter @ocean-palette/client run typecheck

    - name: React Compiler Healthcheck (Client React)
      run: pnpm --filter @ocean-palette/client run react-compiler:check

    - name: Test (Client React)
      run: pnpm --filter @ocean-palette/client run test

    - name: Build (Client React)
      run: pnpm --filter @ocean-palette/client run build
