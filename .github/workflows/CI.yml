name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Use Node.js from .nvmrc
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Audit Dependencies
      run: pnpm audit

    - name: Lint (Server)
      run: pnpm --filter @ocean-palette/server run lint

    - name: Test (Server)
      run: pnpm --filter @ocean-palette/server run test

    - name: Typecheck (Server)
      run: pnpm --filter @ocean-palette/server run type-check

    - name: Build (Server)
      run: pnpm --filter @ocean-palette/server run build

    - name: Lint (Client React)
      run: pnpm --filter @ocean-palette/client run lint

    - name: Typecheck (Client React)
      run: pnpm --filter @ocean-palette/client run type-check

    - name: React Compiler Healthcheck (Client React)
      run: pnpm --filter @ocean-palette/client run react-compiler:check

    - name: Test (Client React)
      run: pnpm --filter @ocean-palette/client run test

    - name: Build (Client React)
      run: pnpm --filter @ocean-palette/client run build
